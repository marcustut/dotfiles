# -- settings ------------------------------------------------------------------

# Prefix: C-a locally, C-b inside an SSH session (so a nested/remote tmux
# doesn't collide with the local one). $SSH_CONNECTION is set on the remote.
if-shell '[ -n "$SSH_CONNECTION" ]' {
    set -g prefix C-b
    bind C-b send-prefix
} {
    unbind C-b
    set -g prefix C-a
    bind C-a send-prefix
}

# Mouse support (to resize panes and select windows)
set -g mouse on

# Vi mode (for copy mode and pane switching)
setw -g mode-keys vi

# NOTE: extended-keys (for Claude Code Shift+Enter) was removed — it re-encodes
# pasted newlines (^J) as CSI-u key events, so paste mangled them into `j` plus
# garbled escape bytes. Use Ctrl+J or `\`+Enter for a newline in Claude Code.

# -- variables -----------------------------------------------------------------

EDITOR=nvim
CONFIG_FILE=$HOME/.config/tmux/tmux.conf

# -- display -------------------------------------------------------------------

set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows

setw -g automatic-rename on   # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed

set -g set-titles on          # set terminal title

set -g display-panes-time 800 # slightly longer pane indicators display time
set -g display-time 1000      # slightly longer status messages display time

set -g status-position bottom # make the status bar appear at the top
set -g status-interval 10     # redraw status line every 10 seconds

set -g status-justify centre  # center window titles in status bar
set -g allow-passthrough on   # allow sequences to pass through tmux

# -- keybinds ------------------------------------------------------------------

# Edit configuration
bind e new-window -n "tmux_conf" -e EDITOR="$EDITOR" sh -c '${EDITOR} ${CONFIG_FILE} && tmux source-file ${CONFIG_FILE}'

# Reload configuration (re-applies theme to match current macOS appearance)
bind r source-file $CONFIG_FILE \; run-shell '~/.config/tmux/set-theme.sh' \; display "sourced tmux config"

# Find session
bind C-f command-prompt -p find-session 'switch-client -t %%'

# Vim-like pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# -- copy mode -----------------------------------------------------------------

bind Enter copy-mode # enter copy mode

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# copy to X11 clipboard
if -b 'command -v xsel > /dev/null 2>&1' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | xsel -i -b"'
if -b '! command -v xsel > /dev/null 2>&1 && command -v xclip > /dev/null 2>&1' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | xclip -i -selection clipboard >/dev/null 2>&1"'
# copy to Wayland clipboard
if -b '[ "$XDG_SESSION_TYPE" = "wayland" ] && command -v wl-copy > /dev/null 2>&1' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | wl-copy"'
# copy to macOS clipboard
if -b 'command -v pbcopy > /dev/null 2>&1' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | pbcopy"'
# copy to Windows clipboard
if -b 'command -v clip.exe > /dev/null 2>&1' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - | clip.exe"'
if -b '[ -c /dev/clipboard ]' 'bind y run -b "\"\$TMUX_PROGRAM\" \${TMUX_SOCKET:+-S \"\$TMUX_SOCKET\"} save-buffer - > /dev/clipboard"'

# -- plugins -------------------------------------------------------------------

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Theme — flavour follows macOS appearance at config load (reload with prefix+r).
# AppleInterfaceStyle key exists only in Dark mode; absent == Light.

# Catppuccin (active): latte (light) / macchiato (dark)
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_window_status_style 'none'
# Flavor follows macOS appearance. set-theme.sh unsets stale @thm_* vars first
# (catppuccin's -ogq sets won't overwrite), so prefix+r switches live without a
# server restart.
run-shell '~/.config/tmux/set-theme.sh'

# Gruvbox (alternate): uncomment block above's swap — dark / light
# set -g @plugin 'egel/tmux-gruvbox'
# if-shell '[ "$(defaults read -g AppleInterfaceStyle 2>/dev/null)" = "Dark" ]' \
#   "set -g @tmux-gruvbox 'dark'" \
#   "set -g @tmux-gruvbox 'light'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
